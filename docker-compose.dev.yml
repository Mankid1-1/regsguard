version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: regsguard_db
    environment:
      POSTGRES_USER: regsguard
      POSTGRES_PASSWORD: regsguard_dev
      POSTGRES_DB: regsguard
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U regsguard"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
